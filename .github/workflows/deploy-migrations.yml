name: Deploy Supabase Migrations

on:
  push:
    branches:
      - main
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/deploy-migrations.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1

      - name: Link, Query, Repair, Dry-run, and Deploy
        run: |
          # Redirect all output to step.log
          exec > >(tee -i step.log) 2>&1
          
          echo "=== LINKING PROJECT ==="
          supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"
          
          echo "=== QUERYING MIGRATION HISTORY ==="
          # Execute query to see remote migrations
          supabase db query "SELECT version, name FROM supabase_migrations.schema_migrations ORDER BY version" --password "$SUPABASE_DB_PASSWORD" || true
          
          echo "=== MIGRATION LIST ==="
          supabase migration list --password "$SUPABASE_DB_PASSWORD" || true
