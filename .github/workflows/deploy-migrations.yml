name: Deploy Supabase Migrations

on:
  push:
    branches:
      - main
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/deploy-migrations.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1

      - name: Link, Repair, Dry-run, and Deploy Migrations
        run: |
          # Redirect all output to step.log
          exec > >(tee -i step.log) 2>&1
          
          echo "=== LINKING PROJECT ==="
          if ! supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"; then
            echo "ERROR: Linking project failed."
            exit 1
          fi
          
          echo "=== QUERYING MIGRATION HISTORY BEFORE ==="
          psql "postgresql://postgres:$SUPABASE_DB_PASSWORD@db.$SUPABASE_PROJECT_REF.supabase.co:5432/postgres" -c "SELECT version, name FROM supabase_migrations.schema_migrations ORDER BY version"
          
          echo "=== DELETING DANGLING 0009 RECORD ==="
          psql "postgresql://postgres:$SUPABASE_DB_PASSWORD@db.$SUPABASE_PROJECT_REF.supabase.co:5432/postgres" -c "DELETE FROM supabase_migrations.schema_migrations WHERE version = '0009';"
          
          echo "=== QUERYING MIGRATION HISTORY AFTER ==="
          psql "postgresql://postgres:$SUPABASE_DB_PASSWORD@db.$SUPABASE_PROJECT_REF.supabase.co:5432/postgres" -c "SELECT version, name FROM supabase_migrations.schema_migrations ORDER BY version"
          
          echo "=== MIGRATION LIST BEFORE PUSH ==="
          supabase migration list --password "$SUPABASE_DB_PASSWORD" || true
          
          echo "=== DRY RUN ==="
          if ! supabase db push --dry-run --password "$SUPABASE_DB_PASSWORD"; then
            echo "ERROR: Dry run failed."
            exit 1
          fi
          
          echo "=== DEPLOYING MIGRATIONS ==="
          if ! supabase db push --password "$SUPABASE_DB_PASSWORD"; then
            echo "ERROR: Deployment failed."
            exit 1
          fi
          
          echo "=== MIGRATION LIST AFTER PUSH ==="
          supabase migration list --password "$SUPABASE_DB_PASSWORD" || true

      - name: Run Live Database Verification
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://${{ secrets.SUPABASE_PROJECT_REF }}.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          # Redirect all output to step.log (append mode)
          exec > >(tee -i -a step.log) 2>&1
          
          echo "=== RUNNING LIVE VERIFICATION ==="
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "WARNING: SUPABASE_SERVICE_ROLE_KEY secret is not set in GitHub repository."
            echo "Cannot run live database verification pass without the service role key."
          else
            echo "Installing @supabase/supabase-js..."
            npm install @supabase/supabase-js
            echo "Executing verification script..."
            node tmp/verify_database.js
          fi

      - name: Send logs to public channel
        if: always()
        run: |
          if [ -f step.log ]; then
            curl -H "Title: Step Log" --data-binary @step.log ntfy.sh/predchain_logs_6d24e36e || true
          else
            echo "step.log not found." | curl -H "Title: Error Log" -d @- ntfy.sh/predchain_logs_6d24e36e || true
          fi
